name: build

# 触发:
#   - 手动(Actions 页面点 "Run workflow"):三平台都编,安装包作为 artifact 上传,随时下载。
#   - 打 tag v*(如 v0.1.0):三平台都编,并创建一个 draft Release,安装包作为附件。
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 打 tag 时创建 Release 需要

jobs:
  build:
    strategy:
      fail-fast: false # 一个平台挂了,其余照常出包(首轮排错时尤其有用)
      matrix:
        include:
          - platform: macos-latest # Apple Silicon(arm64)
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    env:
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v6

      # Tauri v2 + cpal(ALSA)+ 系统托盘 + AppImage 所需的系统库
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            build-essential curl wget file pkg-config patchelf libfuse2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # sherpa-onnx-sys 首次构建会从 GitHub Release 下载该平台的预编译静态库
      #(~ 数十 MB),缓存在 workspace 根 target/sherpa-onnx-prebuilt/ 下。
      # 单独缓存,省下载时间、抗网络抖动。版本号随 Cargo.toml 里 sherpa-onnx 更新。
      - name: Cache sherpa-onnx prebuilt libs
        uses: actions/cache@v5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-${{ matrix.platform }}-1.13.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # tauri-action 会:跑 beforeBuildCommand(pnpm build)→ cargo build → 打安装包。
      # 给了 --target,产物统一落在 target/<triple>/release/bundle/ 下,便于下面上传。
      # 打 tag 时(tagName 非空)顺带创建 draft Release 并上传安装包;非 tag 时 tagName 为空,只编译。
      - name: Build Tauri app
        id: build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Larkwing __VERSION__
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # 手动触发(非 tag)时,把安装包当 artifact 传上去,直接在 run 页面下载
      - name: Upload installers as artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: larkwing-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: warn
