name: build

# 触发:
#   - 手动(Actions 页面点 "Run workflow"):macOS + Windows 都编,安装包作为 artifact 上传,随时下载。
#   - 打 tag v*(如 v0.1.0):macOS + Windows 都编,并创建一个 draft Release,安装包作为附件。
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 打 tag 时创建 Release 需要

jobs:
  build:
    strategy:
      fail-fast: false # 一个平台挂了,其余照常出包(首轮排错时尤其有用)
      matrix:
        include:
          - platform: macos-latest # Apple Silicon(arm64)
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    env:
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # sherpa-onnx-sys 首次构建会从 GitHub Release 下载该平台的预编译静态库
      #(~ 数十 MB),缓存在 workspace 根 target/sherpa-onnx-prebuilt/ 下。
      # 单独缓存,省下载时间、抗网络抖动。版本号随 Cargo.toml 里 sherpa-onnx 更新。
      - name: Cache sherpa-onnx prebuilt libs
        uses: actions/cache@v5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-${{ matrix.platform }}-1.13.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # 从 CHANGELOG.md 抽「本版本那一节」作为 Release 正文(以后发版自动带说明,不用手填)。
      # 取 tag(v0.1.1)去掉 v → 0.1.1,匹配 `## 0.1.1 …` 到下一个 `## 数字` 之间的内容。
      # shell: bash 让 mac/windows 同一套脚本;非 tag(手动触发)抽不到 → 兜底一句。
      - name: 取本版本更新日志
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VER_RE="${VERSION//./\\.}"
          BODY="$(awk -v ver="$VER_RE" '$0 ~ ("^## " ver "( |$)"){f=1;next} f&&/^## [0-9]/{exit} f{print}' CHANGELOG.md)"
          if [ -z "$BODY" ]; then BODY="下载下方对应平台的安装包安装即可。"; fi
          {
            echo "body<<__LW_NOTES_EOF__"
            echo "$BODY"
            echo "__LW_NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      # tauri-action 会:跑 beforeBuildCommand(pnpm build)→ cargo build → 打安装包。
      # 给了 --target,产物统一落在 target/<triple>/release/bundle/ 下,便于下面上传。
      # 打 tag 时(tagName 非空)顺带创建 draft Release 并上传安装包;非 tag 时 tagName 为空,只编译。
      - name: Build Tauri app
        id: build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Larkwing __VERSION__
          # 正文取自上一步(CHANGELOG 本版本节);非 tag 触发时 tauri-action 不建 Release,此值被忽略
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # 手动触发(非 tag)时,把安装包当 artifact 传上去,直接在 run 页面下载
      - name: Upload installers as artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: larkwing-${{ matrix.target }}
          # 只传最终安装包(mac 的 .app 中间产物等碎文件不进 artifact)
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn
